<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="%PUBLIC_URL%/logo.png" />
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Nunito+Sans:ital,opsz,wght@0,6..12,300;0,6..12,400;0,6..12,500;0,6..12,600;0,6..12,700;0,6..12,800;1,6..12,400&family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="Ashan Akalanka portfolio - AI undergraduate, software developer, and full-stack project showcase." />
  <script>
    (function () {
      var storedTheme = localStorage.getItem("theme");
      var isDark = storedTheme === "dark";
      var root = document.documentElement;
      var pageColor = isDark ? "#0a192f" : "#f5f5f7";
      var themeMeta = document.querySelector('meta[name="theme-color"]');

      if (isDark) {
        root.classList.add("dark");
      } else {
        root.classList.remove("dark");
      }

      root.style.backgroundColor = pageColor;
      if (document.body) {
        document.body.style.backgroundColor = pageColor;
      }

      if (themeMeta) {
        themeMeta.setAttribute("content", pageColor);
      }
    })();
  </script>
  <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  <title>Ashan | Portfolio</title>
</head>

<body style="background-color: #f5f5f7;">
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>

</body>

</html>
